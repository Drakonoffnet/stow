<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8EEF5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0B2540" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#bg)"/>

  <!-- Folder -->
  <g filter="url(#shadow)">
    <!-- folder tab -->
    <path d="M232 348
             q0 -40 40 -40
             h150
             q22 0 38 16
             l34 34
             h240
             q40 0 40 40
             v40 h-582 z"
          fill="url(#folder)"/>
    <!-- folder body -->
    <rect x="232" y="392" width="560" height="356" rx="40" fill="url(#folder)"/>
  </g>

  <!-- Zipper down the folder body -->
  <g stroke="#9FB3C8" stroke-width="14" stroke-linecap="round">
    <line x1="512" y1="430" x2="512" y2="690"/>
  </g>
  <g fill="#7C93AC">
    <!-- teeth -->
    <rect x="470" y="446" width="34" height="14" rx="7"/>
    <rect x="520" y="446" width="34" height="14" rx="7"/>
    <rect x="470" y="486" width="34" height="14" rx="7"/>
    <rect x="520" y="486" width="34" height="14" rx="7"/>
    <rect x="470" y="526" width="34" height="14" rx="7"/>
    <rect x="520" y="526" width="34" height="14" rx="7"/>
  </g>
  <!-- zipper pull -->
  <g>
    <circle cx="512" cy="588" r="30" fill="#3B82F6"/>
    <rect x="500" y="606" width="24" height="74" rx="12" fill="#3B82F6"/>
  </g>

  <!-- Transfer badge: arrow moving right -->
  <g filter="url(#shadow)">
    <circle cx="742" cy="700" r="118" fill="#0EA5A4"/>
    <path d="M690 700 h96 M748 660 l46 40 l-46 40"
          fill="none" stroke="#FFFFFF" stroke-width="26"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
